<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScreenGuard</title>
    <style>
      /* ── Dark theme (default) ── */
      :root {
        --bg-app:     #0f1117;
        --bg-topbar:  #131520;
        --bg-card:    #1a1d2e;
        --bg-row:     #1e2133;
        --border:     #2d3148;
        --border-hi:  #374162;
        --text-1:     #e2e8f0;
        --text-2:     #94a3b8;
        --text-3:     #64748b;
        --text-4:     #475569;
        --accent:     #7c8cf8;
        --accent-sub: rgba(124,140,248,0.10);
      }
      /* ── Light theme ── */
      [data-theme="light"] {
        --bg-app:     #f0f2f7;
        --bg-topbar:  #ffffff;
        --bg-card:    #ffffff;
        --bg-row:     #f7f8fc;
        --border:     #e4e8f0;
        --border-hi:  #c9d1e3;
        --text-1:     #111827;
        --text-2:     #4b5563;
        --text-3:     #9ca3af;
        --text-4:     #d1d5db;
        --accent:     #6366f1;
        --accent-sub: rgba(99,102,241,0.08);
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: var(--bg-app);
        color: var(--text-1);
        height: 100vh;
        overflow: hidden;
        transition: background 0.2s, color 0.2s;
      }
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 3px; }
      input, select, textarea {
        color-scheme: inherit;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
